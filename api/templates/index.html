<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oishi Salgados | Gestão Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcf8f3; }
        .tab-active { background-color: #fef2f2; color: #dc2626; border: 1px solid #fee2e2; }
        .aba { display: none; }
        .aba.ativa { display: grid; }
        #loginOverlay { backdrop-filter: blur(8px); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-[2.5rem] p-8 md:p-12 shadow-2xl w-full max-w-md text-center">
            <div class="text-5xl mb-6">🥟</div>
            <h1 class="text-3xl font-extrabold text-slate-800 mb-2">Bem-vindo!</h1>
            <p class="text-slate-500 mb-8 font-medium">Acesse o painel da Oishi Salgados</p>
            <form id="loginForm" class="space-y-4">
                <input type="email" id="email" placeholder="E-mail" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 focus:border-red-400 outline-none transition-all font-semibold" required>
                <input type="password" id="pass" placeholder="Senha" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 focus:border-red-400 outline-none transition-all font-semibold" required>
                <button type="submit" class="w-full bg-red-500 hover:bg-red-600 text-white font-extrabold py-4 rounded-2xl shadow-lg shadow-red-200 transition-all transform active:scale-95">ENTRAR NO PAINEL</button>
            </form>
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-10 gap-4">
            <div>
                <h2 class="text-4xl font-black text-slate-800 tracking-tight">Oishi <span class="text-red-500 italic">Salgados</span></h2>
                <p class="text-slate-500 font-bold flex items-center gap-2"><span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span> Sistema de Gestão Ativo</p>
            </div>
            <button onclick="logout()" class="px-6 py-2 bg-white text-slate-400 font-bold rounded-xl border border-slate-200 hover:text-red-500 transition-colors">Sair</button>
        </header>

        <nav class="flex gap-2 mb-8 bg-white p-2 rounded-3xl shadow-sm border border-slate-100 overflow-x-auto no-scrollbar">
            <button onclick="mudarAba('insumos')" id="btn-insumos" class="aba-btn flex-1 py-4 px-6 rounded-2xl font-extrabold transition-all whitespace-nowrap">🥕 Insumos</button>
            <button onclick="mudarAba('receitas')" id="btn-receitas" class="aba-btn flex-1 py-4 px-6 rounded-2xl font-extrabold transition-all whitespace-nowrap">📜 Receitas</button>
            <button onclick="mudarAba('caixa')" id="btn-caixa" class="aba-btn flex-1 py-4 px-6 rounded-2xl font-extrabold transition-all whitespace-nowrap">💰 Caixa</button>
        </nav>

        <section id="insumos" class="aba ativa grid md:grid-cols-3 gap-8">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-white h-fit">
                <h3 class="text-2xl font-black text-slate-800 mb-6 flex items-center gap-2">📦 Novo Insumo</h3>
                <form id="formInsumo" class="space-y-4">
                    <input type="text" id="i_nome" placeholder="Nome do Insumo" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 focus:border-red-300 outline-none font-bold" required>
                    <div class="grid grid-cols-2 gap-3">
                        <input type="number" step="0.01" id="i_preco" placeholder="Preço (R$)" class="p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 focus:border-red-300 outline-none font-bold" required>
                        <input type="number" step="0.01" id="i_qtd" placeholder="Qtd (Kg/L/Un)" class="p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 focus:border-red-300 outline-none font-bold" required>
                    </div>
                    <button type="submit" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-extrabold py-4 rounded-2xl transition-all shadow-lg">ADICIONAR</button>
                </form>
            </div>
            <div class="md:col-span-2 bg-white rounded-[2.5rem] shadow-xl border border-white overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-50 text-slate-400 font-bold uppercase text-xs">
                        <tr>
                            <th class="px-8 py-5">Insumo</th>
                            <th class="px-6 py-5 text-right">Custo Unitário</th>
                            <th class="px-8 py-5 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaInsumos" class="divide-y divide-slate-100 font-bold text-slate-700"></tbody>
                </table>
            </div>
        </section>

        <section id="receitas" class="aba grid md:grid-cols-3 gap-8">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-white h-fit">
                <h3 class="text-2xl font-black text-slate-800 mb-6 italic">🍳 Criar Receita</h3>
                <form id="formReceita" class="space-y-4">
                    <input type="text" id="r_nome" placeholder="Nome da Receita" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 font-bold outline-none" required>
                    <div class="p-4 bg-red-50 rounded-2xl border border-red-100">
                        <label class="block text-xs font-black text-red-400 uppercase mb-2">Adicionar Ingrediente</label>
                        <div class="flex gap-2">
                            <select id="r_select_insumo" class="flex-1 bg-transparent font-bold outline-none"></select>
                            <input type="number" step="0.01" id="r_qtd_uso" placeholder="Qtd" class="w-20 bg-white p-2 rounded-lg font-bold">
                            <button type="button" onclick="addInsumoLista()" class="bg-red-500 text-white p-2 rounded-lg font-black">+</button>
                        </div>
                    </div>
                    <div id="listaInsumosReceitaAtual" class="space-y-2 py-2"></div>
                    <input type="number" id="r_rendimento" placeholder="Rendimento (Unidades)" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 font-bold outline-none" required>
                    <button type="submit" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-extrabold py-4 rounded-2xl shadow-lg transition-all">SALVAR RECEITA</button>
                </form>
            </div>
            <div class="md:col-span-2 bg-white rounded-[2.5rem] shadow-xl border border-white overflow-hidden">
                <table class="w-full">
                    <thead class="bg-slate-50 text-slate-400 font-bold uppercase text-xs">
                        <tr>
                            <th class="px-8 py-5 text-left">Produto</th>
                            <th class="py-5 text-right">Rende</th>
                            <th class="py-5 text-right">Custo Total</th>
                            <th class="py-5 text-right">Custo Un.</th>
                            <th class="px-8 py-5 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="listaReceitas" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </section>

        <section id="caixa" class="aba grid md:grid-cols-3 gap-8">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-xl border border-white h-fit">
                <h3 id="formTitleFechamento" class="text-2xl font-black text-slate-800 mb-6">🧾 Lançar Faturamento</h3>
                <form id="formFechamento" class="space-y-4">
                    <input type="hidden" id="f_editId">
                    <div>
                        <label class="text-xs font-black text-slate-400 uppercase ml-2">💰 Dinheiro em Espécie</label>
                        <input type="number" step="0.01" id="f_din" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 font-bold outline-none" placeholder="0.00">
                    </div>
                    <div>
                        <label class="text-xs font-black text-slate-400 uppercase ml-2">📱 Pix</label>
                        <input type="number" step="0.01" id="f_pix" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 font-bold outline-none" placeholder="0.00">
                    </div>
                    <div>
                        <label class="text-xs font-black text-slate-400 uppercase ml-2">💳 Cartões (Déb/Créd)</label>
                        <input type="number" step="0.01" id="f_card" class="w-full p-4 rounded-2xl bg-slate-50 border-2 border-slate-100 font-bold outline-none" placeholder="0.00">
                    </div>
                    <div class="grid grid-cols-2 gap-3 pt-2">
                        <div>
                            <label class="text-xs font-black text-orange-400 uppercase ml-2">Fundo Inicial</label>
                            <input type="number" step="0.01" id="f_fundo" class="w-full p-4 rounded-2xl bg-orange-50 border-2 border-orange-100 font-bold outline-none">
                        </div>
                        <div>
                            <label class="text-xs font-black text-red-400 uppercase ml-2">Sangria/Desp.</label>
                            <input type="number" step="0.01" id="f_sangria" class="w-full p-4 rounded-2xl bg-red-50 border-2 border-red-100 font-bold outline-none">
                        </div>
                    </div>
                    <button type="submit" id="btnSubmitFechamento" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-extrabold py-4 rounded-2xl shadow-lg transition-all">SALVAR FECHAMENTO</button>
                    <button type="button" id="btnCancelFechamento" onclick="cancelarEdicaoFechamento()" class="w-full bg-slate-200 text-slate-600 font-bold py-2 rounded-xl hidden">Cancelar Edição</button>
                </form>
            </div>
            <div class="md:col-span-2 space-y-4">
                <div id="listaFechamentos" class="grid gap-4"></div>
            </div>
        </section>
    </div>

    <script>
        // CONFIGURAÇÕES E AUTH
        let userToken = localStorage.getItem('oishi_token');
        if (userToken) document.getElementById('loginOverlay').classList.add('hidden');

        async function fetchAuth(url, options = {}) {
            const headers = { 'Authorization': `Bearer ${userToken}`, 'Content-Type': 'application/json' };
            return fetch(url, { ...options, headers });
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('pass').value;
            
            // Aqui usamos a própria API Supabase via CDN para autenticar
            const { data, error } = await supabase.createClient('{{URL}}', '{{KEY}}').auth.signInWithPassword({ email, password });
            
            if (error) {
                alert("Login falhou: " + error.message);
            } else {
                userToken = data.session.access_token;
                localStorage.setItem('oishi_token', userToken);
                location.reload();
            }
        };

        function logout() {
            localStorage.removeItem('oishi_token');
            location.reload();
        }

        // NAVEGAÇÃO
        function mudarAba(abaId) {
            document.querySelectorAll('.aba').forEach(a => a.classList.remove('ativa'));
            document.querySelectorAll('.aba-btn').forEach(b => b.classList.remove('tab-active'));
            document.getElementById(abaId).classList.add('ativa');
            document.getElementById('btn-' + abaId).classList.add('tab-active');
            if (abaId === 'insumos') carregarInsumos();
            if (abaId === 'receitas') { carregarInsumos(); carregarReceitas(); }
            if (abaId === 'caixa') carregarFechamentos();
        }
        mudarAba('insumos');

        // LÓGICA INSUMOS
        async function carregarInsumos() {
            const res = await fetchAuth('/api/insumos');
            const dados = await res.json();
            const tbody = document.getElementById('listaInsumos');
            const select = document.getElementById('r_select_insumo');
            
            tbody.innerHTML = dados.map(i => `
                <tr>
                    <td class="px-8 py-4">${i.nome}</td>
                    <td class="px-6 py-4 text-right text-emerald-600">R$ ${parseFloat(i.custo_unitario).toFixed(2)}</td>
                    <td class="px-8 py-4 text-center">
                        <button onclick="excluirInsumo(${i.id})" class="text-red-300 hover:text-red-500 transition-colors text-xl">🗑️</button>
                    </td>
                </tr>
            `).join('');

            select.innerHTML = `<option value="">Escolha...</option>` + dados.map(i => `<option value='${JSON.stringify(i)}'>${i.nome}</option>`).join('');
        }

        document.getElementById('formInsumo').onsubmit = async (e) => {
            e.preventDefault();
            const payload = { nome: document.getElementById('i_nome').value, preco: document.getElementById('i_preco').value, quantidade: document.getElementById('i_qtd').value };
            await fetchAuth('/api/insumos', { method: 'POST', body: JSON.stringify(payload) });
            document.getElementById('formInsumo').reset();
            carregarInsumos();
        };

        async function excluirInsumo(id) {
            if (confirm("Excluir este insumo?")) {
                await fetchAuth(`/api/insumos/${id}`, { method: 'DELETE' });
                carregarInsumos();
            }
        }

        // LÓGICA RECEITAS
        let insumosReceitaTemp = [];
        function addInsumoLista() {
            const sel = document.getElementById('r_select_insumo');
            if (!sel.value) return;
            const insumo = JSON.parse(sel.value);
            const qtd = parseFloat(document.getElementById('r_qtd_uso').value);
            if (!qtd) return;

            const custo = insumo.custo_unitario * qtd;
            insumosReceitaTemp.push({ id: insumo.id, nome: insumo.nome, qtd, custo });
            renderListaTemp();
        }

        function renderListaTemp() {
            document.getElementById('listaInsumosReceitaAtual').innerHTML = insumosReceitaTemp.map((item, idx) => `
                <div class="flex justify-between bg-white p-2 rounded-xl text-sm font-bold shadow-sm border border-slate-100">
                    <span>${item.nome} (${item.qtd})</span>
                    <span class="text-red-500">R$ ${item.custo.toFixed(2)} <button type="button" onclick="insumosReceitaTemp.splice(${idx},1);renderListaTemp()" class="ml-2">✕</button></span>
                </div>
            `).join('');
        }

        document.getElementById('formReceita').onsubmit = async (e) => {
            e.preventDefault();
            const total = insumosReceitaTemp.reduce((a, b) => a + b.custo, 0);
            const rendimentoVal = parseFloat(document.getElementById('r_rendimento').value);
            
            const payload = { 
                nome: document.getElementById('r_nome').value, 
                rendimento: rendimentoVal, 
                custo_total: total, 
                custo_unitario: total / (rendimentoVal || 1), // CORRETO: custo_unitario
                ingredientes: insumosReceitaTemp 
            };
            
            const res = await fetchAuth('/api/receitas', { method: 'POST', body: JSON.stringify(payload) });
            if (res.ok) {
                document.getElementById('formReceita').reset(); 
                insumosReceitaTemp = []; 
                document.getElementById('listaInsumosReceitaAtual').innerHTML = ''; 
                carregarReceitas();
            } else {
                const erroData = await res.json();
                alert("Erro ao salvar: " + (erroData.error || "Verifique as colunas do banco."));
            }
        };

        async function carregarReceitas() {
            const res = await fetchAuth('/api/receitas');
            const dados = await res.json();
            document.getElementById('listaReceitas').innerHTML = dados.map(r => `
                <tr class="border-b">
                    <td class="py-3 px-8 font-bold text-slate-800">${r.nome}</td>
                    <td class="text-right text-slate-500">${r.rendimento} un</td>
                    <td class="text-right font-bold text-red-500 px-4">R$ ${parseFloat(r.custo_total).toFixed(2)}</td>
                    <td class="text-right font-black text-emerald-600 px-4">R$ ${parseFloat(r.custo_unitario).toFixed(2)}</td> <td class="text-center px-8">
                        <button onclick="excluirReceita(${r.id})" class="text-red-400 hover:text-red-600">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        async function excluirReceita(id) {
            if (confirm("Excluir receita?")) {
                await fetchAuth(`/api/receitas/${id}`, { method: 'DELETE' });
                carregarReceitas();
            }
        }

        // LÓGICA CAIXA
        const formFechamento = document.getElementById('formFechamento');
        const f_editId = document.getElementById('f_editId');
        const f_din = document.getElementById('f_din');
        const f_pix = document.getElementById('f_pix');
        const f_card = document.getElementById('f_card');
        const f_fundo = document.getElementById('f_fundo');
        const f_sangria = document.getElementById('f_sangria');
        const formTitleFechamento = document.getElementById('formTitleFechamento');
        const btnSubmitFechamento = document.getElementById('btnSubmitFechamento');
        const btnCancelFechamento = document.getElementById('btnCancelFechamento');

        let fechamentosGeral = [];

        async function carregarFechamentos() {
            const res = await fetchAuth('/api/fechamentos');
            fechamentosGeral = await res.json();
            document.getElementById('listaFechamentos').innerHTML = fechamentosGeral.map(f => {
                const dataFormatada = f.data ? new Date(f.data).toLocaleString('pt-BR') : 'Sem data';
                return `
                <div class="bg-white p-6 rounded-[2rem] shadow-md border border-slate-100 flex justify-between items-center group">
                    <div class="flex-1">
                        <div class="text-xs font-black text-slate-300 uppercase mb-1">${dataFormatada}</div>
                        <div class="flex gap-6">
                            <div><p class="text-[10px] font-black text-slate-400 uppercase">Total Vendas</p><p class="text-xl font-black text-slate-800">R$ ${parseFloat(f.total_global).toFixed(2)}</p></div>
                            <div><p class="text-[10px] font-black text-emerald-400 uppercase">Faturamento</p><p class="text-xl font-black text-emerald-600">R$ ${(f.caixa_dinheiro + f.caixa_pix + f.caixa_cartao).toFixed(2)}</p></div>
                        </div>
                    </div>
                    <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                        <button onclick="editarFechamento(${f.id})" class="p-3 bg-blue-50 text-blue-500 rounded-2xl hover:bg-blue-500 hover:text-white transition-all">✏️</button>
                        <button onclick="excluirFechamento(${f.id})" class="p-3 bg-red-50 text-red-500 rounded-2xl hover:bg-red-500 hover:text-white transition-all">🗑️</button>
                    </div>
                </div>`;
            }).join('');
        }

        formFechamento.onsubmit = async (e) => {
            e.preventDefault();
            const payload = { fundo_caixa: f_fundo.value, despesas_dia: f_sangria.value, caixa_dinheiro: f_din.value, caixa_pix: f_pix.value, caixa_cartao: f_card.value };
            const id = f_editId.value;
            await fetchAuth(id ? `/api/fechamentos/${id}` : '/api/fechamentos', { method: id ? 'PUT' : 'POST', body: JSON.stringify(payload) });
            cancelarEdicaoFechamento(); 
            carregarFechamentos();
        };

        function editarFechamento(id) {
            const f = fechamentosGeral.find(item => item.id === id);
            f_editId.value = f.id; 
            f_fundo.value = f.fundo_caixa; 
            f_sangria.value = f.despesas_dia; 
            f_din.value = f.caixa_dinheiro; 
            f_pix.value = f.caixa_pix; 
            f_card.value = f.caixa_cartao;
            formTitleFechamento.innerText = "✏️ Editar Dados";
            btnSubmitFechamento.innerText = "ATUALIZAR";
            btnSubmitFechamento.classList.replace('bg-emerald-500', 'bg-blue-500');
            btnCancelFechamento.classList.remove('hidden');
        }

        function cancelarEdicaoFechamento() {
            formFechamento.reset(); 
            f_editId.value = "";
            formTitleFechamento.innerText = "🧾 Lançar Faturamento";
            btnSubmitFechamento.innerText = "SALVAR FECHAMENTO";
            btnSubmitFechamento.classList.replace('bg-blue-500', 'bg-emerald-500');
            btnCancelFechamento.classList.add('hidden');
        }

        async function excluirFechamento(id) {
            if (confirm("Excluir este lançamento?")) {
                await fetchAuth(`/api/fechamentos/${id}`, { method: 'DELETE' });
                carregarFechamentos();
            }
        }
    </script>
</body>
</html>
